name: govulncheck

on:
  push:
    branches: [main]
  schedule:
    # Weekly on Monday morning so new CVEs surface even when the repo is quiet.
    - cron: "30 6 * * 1"

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
