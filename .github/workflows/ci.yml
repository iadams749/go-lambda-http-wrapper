name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly on Monday morning so new CVEs surface even when the repo is quiet.
    - cron: "30 6 * * 1"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 2 gives Codecov the parent commit it needs to attach the report.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make check
      - run: go test -race -covermode=atomic -coverprofile=coverage.txt ./...
      - uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
